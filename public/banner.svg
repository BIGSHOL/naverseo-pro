<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#03C75A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#03C75A" stop-opacity="0.1" />
    </linearGradient>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Grid Pattern -->
  <path d="M0 0 L1200 0 M0 63 L1200 63 M0 126 L1200 126 M0 189 L1200 189 M0 252 L1200 252 M0 315 L1200 315 M0 378 L1200 378 M0 441 L1200 441 M0 504 L1200 504 M0 567 L1200 567 M0 630 L1200 630" stroke="#334155" stroke-opacity="0.2" stroke-width="1" />
  <path d="M0 0 L0 630 M120 0 L120 630 M240 0 L240 630 M360 0 L360 630 M480 0 L480 630 M600 0 L600 630 M720 0 L720 630 M840 0 L840 630 M960 0 L960 630 M1080 0 L1080 630 M1200 0 L1200 630" stroke="#334155" stroke-opacity="0.2" stroke-width="1" />

  <!-- Main Dashboard Card -->
  <g transform="translate(600, 340)">
    <!-- Card Base -->
    <rect x="-350" y="-180" width="700" height="360" rx="20" fill="#1E293B" fill-opacity="0.7" stroke="#334155" stroke-width="2" />
    
    <!-- Header -->
    <text x="-320" y="-140" font-family="sans-serif" font-size="18" fill="#94A3B8" font-weight="bold">KEYWORD ANALYSIS</text>
    <line x1="-350" y1="-120" x2="350" y2="-120" stroke="#334155" stroke-width="1" />

    <!-- Chart Area -->
    <!-- Y-axis lines -->
    <line x1="-320" y1="-80" x2="320" y2="-80" stroke="#334155" stroke-dasharray="4" stroke-opacity="0.5" />
    <line x1="-320" y1="-20" x2="320" y2="-20" stroke="#334155" stroke-dasharray="4" stroke-opacity="0.5" />
    <line x1="-320" y1="40" x2="320" y2="40" stroke="#334155" stroke-dasharray="4" stroke-opacity="0.5" />
    <line x1="-320" y1="100" x2="320" y2="100" stroke="#334155" stroke-dasharray="4" stroke-opacity="0.5" />

    <!-- Area Chart -->
    <path d="M-320 100 L-260 40 L-200 60 L-140 -20 L-80 10 L-20 -50 L40 -30 L100 -80 L160 -40 L220 -90 L280 -60 L320 -100 V120 H-320 Z" fill="url(#chartGradient)" />
    <path d="M-320 100 L-260 40 L-200 60 L-140 -20 L-80 10 L-20 -50 L40 -30 L100 -80 L160 -40 L220 -90 L280 -60 L320 -100" stroke="#03C75A" stroke-width="4" fill="none" />

    <!-- SEO Score Badge -->
    <g transform="translate(250, -180)">
       <circle cx="0" cy="0" r="40" fill="#0F172A" stroke="#334155" stroke-width="2" />
       <path d="M0 -35 A 35 35 0 1 1 -25 25" fill="none" stroke="#03C75A" stroke-width="6" stroke-linecap="round" />
       <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="20" fill="white" font-weight="bold">85</text>
       <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94A3B8">SEO SCORE</text>
    </g>
  </g>

  <!-- Floating Elements -->
  <!-- Search Icon -->
  <g transform="translate(200, 200) rotate(-15)">
    <circle cx="0" cy="0" r="40" fill="#03C75A" fill-opacity="0.2" />
    <circle cx="0" cy="0" r="25" stroke="#03C75A" stroke-width="4" fill="none" />
    <line x1="18" y1="18" x2="35" y2="35" stroke="#03C75A" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Title Text -->
  <g transform="translate(600, 120)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="64" fill="white" font-weight="900" letter-spacing="-1">
      NaverSEO <tspan fill="#03C75A">Pro</tspan>
    </text>
    <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#94A3B8" font-weight="400">
      AI-Powered SEO Analytics & Optimization
    </text>
  </g>
</svg>
